name: svm_hourly_baseline
description: >
  Baseline SVM experiment using hourly sensor data to correct WRF SW_dif.
  Uses RBF kernel with default hyperparameters.
seed: 42
data:
  hourly_data_path: data/hourly/sensor_data.csv
  target_column: SW_dif
  feature_columns:
    - SWDOWN
    - T2
    - Q2
    - PSFC
  use_raw: false

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  shuffle: false

preprocess:
  scaler_type: standard
  impute_strategy: drop
  drop_na_threshold: 0.5

features:
  lag_steps: []
  rolling_windows: []
  add_temporal: true
  cyclic_encoding: true
  add_diffs: false

model:
  model_type: svm
  # model_native preserves previous SVM metrics on the full processed test set.
  # Use common_sequence_horizon for fair comparison with LSTM/Transformer windows.
  evaluation_policy: model_native
  svm_kernel: rbf
  svm_c: 10.0
  svm_epsilon: 0.1
  svm_gamma: scale

output_dir: output/experiments
