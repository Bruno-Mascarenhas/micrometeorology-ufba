name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        run: |
          uv sync --frozen --extra dev --extra tcc

      - name: Audit dependencies for known vulnerabilities
        run: |
          uv export --format requirements-txt --no-emit-project -o requirements-audit.txt
          uvx pip-audit --strict --disable-pip -r requirements-audit.txt

      - name: Cache MyPy
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Format with Ruff
        run: |
          uv run ruff format --check .

      - name: Lint with Ruff
        run: |
          uv run ruff check .

      - name: Typecheck with MyPy
        run: |
          uv run mypy src tests

      - name: Test with pytest
        run: |
          uv run pytest -n auto --maxfail=1 -v tests/
